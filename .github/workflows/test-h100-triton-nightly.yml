name: CI Build and Test (H100, Triton nightly)

# Companion to test-h100.yml — same H100 runner, same cu130 PyTorch, same
# .ci/setup-h100.sh, same .ci/run_tests.sh + SKIP_CONDA=1. Only difference:
# CONDA_ENV=triton-main instead of meta-triton, which switches the active
# uv venv from FB Triton (3.6.0+fb.beta) to upstream Triton main snapshot
# (3.7.0+gitcd8e4acc, pinned by the runner image).
#
# Probed 2026-05-06: triton-main venv ships PyTorch 2.13.0.dev+cu130 (same
# build as meta-triton), Triton editable from /workspace/triton-main, all
# nvidia-cu13 runtime libs already installed. Setup-h100.sh's 75s
# cuda-toolkit-13-0 install is still required (no nvcc on the runner).
#
# Triggers narrow during stabilization: workflow_dispatch + pushes that
# touch this file or the shared CI/code paths. Once green and triton-main
# proves stable as a canary, broaden to push branches main/develop and
# pull_request, mirroring test-h100.yml.

on:
  workflow_dispatch:
    inputs:
      test-type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "build-only"
          - "vectoradd"
      debug:
        description: "Enable debug build"
        required: true
        default: false
        type: boolean
  push:
    paths:
      - ".github/workflows/test-h100-triton-nightly.yml"
      - ".ci/setup-h100.sh"
      - ".ci/run_tests.sh"
      - "Makefile"
      - "src/**"
      - "include/**"
      - "python/**"
      - "tests/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test-h100-triton-nightly:
    if: github.repository_owner == 'facebookexperimental'
    runs-on: [linux-gcp-h100]
    timeout-minutes: 60
    env:
      # Switch the runner-provided uv venv from meta-triton (FB Triton fork)
      # to triton-main (upstream Triton main, snapshot pinned by SETUP_SCRIPT).
      CONDA_ENV: triton-main
      SETUP_SCRIPT: /workspace/setup_instance.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Tune Nvidia GPU
        run: |
          sudo nvidia-smi -pm 1 || echo "::warning::sudo nvidia-smi -pm failed"
          sudo ldconfig || echo "::warning::sudo ldconfig failed"
          nvidia-smi

      - name: Activate uv venv (source SETUP_SCRIPT, persist env)
        run: |
          . "$SETUP_SCRIPT"
          {
            echo "PATH=$PATH"
            echo "VIRTUAL_ENV=$VIRTUAL_ENV"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "TRITONBENCH_PYTORCH_REPO_PATH=$TRITONBENCH_PYTORCH_REPO_PATH"
          } >> "$GITHUB_ENV"
          echo "Active venv: $VIRTUAL_ENV"

      - name: Verify Triton (which version are we actually testing?)
        # Cheap sanity check before paying for cuda-toolkit-13-0. If
        # triton-main venv ever loses upstream Triton or starts pointing
        # somewhere else, fail loud here before wasting 75s on apt.
        run: |
          python - <<'PY'
          import sys, triton, torch
          print(f"python : {sys.version.split()[0]}")
          print(f"torch  : {torch.__version__} (cuda={torch.version.cuda})")
          print(f"triton : {triton.__version__}")
          print(f"  path : {triton.__file__}")
          assert "fb" not in triton.__version__, (
              f"expected upstream Triton, got FB fork: {triton.__version__}"
          )
          PY

      - name: Setup H100 environment (apt + CUDA + cutracer pip)
        run: bash .ci/setup-h100.sh

      - name: Run tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type || 'all' }}
          TIMEOUT: 60
          INSTALL_THIRD_PARTY: 1
          SKIP_CONDA: 1
          DEBUG: ${{ github.event.inputs.debug == 'true' && '1' || '0' }}
        run: bash .ci/run_tests.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-h100-cuda13.0-triton-nightly
          path: |
            tests/vectoradd/*.sass
            tests/vectoradd/*.log
            tests/vectoradd/*.ndjson
            tests/vectoradd/*.ndjson.zstd
            tests/py_add/*.log
            tests/py_add/*.sass
            tests/py_add/*.ndjson
            tests/py_add/*.ndjson.zstd
            tests/py_add/mode*_validation.log
            tests/py_add/mode*_run.log
            tests/py_add/mode1_decompressed.ndjson
            tests/proton_tests/*.log
            tests/proton_tests/*.sass
            tests/proton_tests/*.csv
