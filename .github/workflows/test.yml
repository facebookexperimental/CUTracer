name: CI Build and Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:
    inputs:
      test-type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "build-only"
          - "vectoradd"
      debug:
        description: "Enable debug build"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install clang-format
        run: |
          python -m pip install clang-format==21.1.2

      - name: Install Python formatting tools
        run: |
          python -m pip install -e "./python[dev]"

      - name: Run formatter check
        run: |
          ./format.sh check

  build-and-test:
    runs-on: 4-core-ubuntu-gpu-t4
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        triton: [default, nightly]
    # The `nightly` leg installs upstream Triton main (via OpenAI's
    # Triton-Nightly feed), which can drift out of ABI sync with the
    # `triton` commit pinned by the current PyTorch nightly. Treat it as
    # a canary: surface the failure in the PR check list, but don't
    # block merges on it. The `default` leg remains required.
    continue-on-error: ${{ matrix.triton == 'nightly' }}
    env:
      DEBUG: "0"
      CONDA_ENV: "cutracer-${{ matrix.triton }}"
      # OpenAI-published Triton nightly wheel feed. The package is `triton`,
      # built from triton-lang/triton main; versions look like
      # 3.7.0+gitXXXXXXXX (commit-pinned, reproducible). Used only by the
      # `nightly` matrix leg.
      TRITON_NIGHTLY_INDEX_URL: "https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/Triton-Nightly/pypi/simple/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup environment
        env:
          CUDA_VERSION: "12.8"
        run: |
          bash .ci/setup.sh
      - name: Install Triton nightly
        if: matrix.triton == 'nightly'
        env:
          # Provided so the Triton-nightly resolver below can authenticate
          # to the GitHub Actions API. Without this, we hit the 60 req/hr
          # unauthenticated limit and silently fall back to the unpinned
          # install. With the workflow token, the limit is 1000/hr per
          # repo; only public-repo read access is needed (default scope).
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate "$CONDA_ENV"
          # PyTorch nightly bundles `pytorch-triton`, which conflicts with
          # the upstream `triton` package (both register `import triton`).
          # Remove both before installing the nightly to avoid a
          # half-overwritten install.
          python -m pip uninstall -y pytorch-triton triton 2>/dev/null || true

          # Workaround: the Triton-Nightly feed publishes wheels with
          # PEP-440 local versions like `3.7.0+gitXXXXXXXX`, which pip
          # sorts lexicographically — so `pip install -U` silently selects
          # an arbitrarily-old wheel rather than the newest commit.
          # We resolve the latest upstream wheels.yml head_sha via GitHub
          # API and pin to it. The resolver lives in tritonparse alongside
          # the existing setup.sh that this workflow already curls.
          # On any resolver failure, fall back to the unpinned install
          # (preserves the original behavior so the canary never regresses).
          PIN_SCRIPT="$(mktemp --suffix=.py)"
          curl -fsSL https://raw.githubusercontent.com/meta-pytorch/tritonparse/main/.ci/triton_nightly_pin.py \
              -o "$PIN_SCRIPT" || rm -f "$PIN_SCRIPT"
          PIN=""
          if [ -s "$PIN_SCRIPT" ]; then
              PY_TAG=$(python -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
              PIN=$(python "$PIN_SCRIPT" --pytag "$PY_TAG" --platform x86_64) || PIN=""
              rm -f "$PIN_SCRIPT"
          fi
          if [[ "$PIN" =~ ^[0-9]+\.[0-9]+\.[0-9]+\+git[0-9a-f]+$ ]]; then
              echo "Pinning Triton nightly to upstream HEAD: triton==$PIN"
              python -m pip install "triton==$PIN" \
                  --extra-index-url "${TRITON_NIGHTLY_INDEX_URL}"
          else
              echo "Resolver did not produce a valid pin (got: '$PIN'); falling back to default"
              python -m pip install -U --pre triton \
                  --extra-index-url "${TRITON_NIGHTLY_INDEX_URL}"
          fi
          python -c "import triton; print(f'Triton: {triton.__version__} from {triton.__file__}')"
      - name: Run tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type || 'all' }}
          TIMEOUT: 60
          INSTALL_THIRD_PARTY: 1
        run: |
          bash .ci/run_tests.sh
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-cuda12.8-debug0-${{ matrix.triton }}
          path: |
            tests/vectoradd/*.sass
            tests/vectoradd/*.log
            tests/vectoradd/*.ndjson
            tests/vectoradd/*.ndjson.zstd
            tests/py_add/*.log
            tests/py_add/*.sass
            tests/py_add/*.ndjson
            tests/py_add/*.ndjson.zstd
            tests/py_add/mode*_validation.log
            tests/py_add/mode*_run.log
            tests/py_add/mode1_decompressed.ndjson
            tests/proton_tests/*.log
            tests/proton_tests/*.sass
            tests/proton_tests/*.csv
  check-status:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ]; then
              echo "✅ All tests passed!"
          else
              echo "❌ Some tests failed!"
              exit 1
          fi
