name: CI Build and Test (H100)

# Companion to test.yml during the cu128 -> cu130 transition.
#
# This job runs on facebookexperimental's GCP H100 runner (linux-gcp-h100,
# k8s pod / containerd, NVIDIA H100 80GB sm_9.0, driver 580.126.09). It
# uses the runner-provided uv venv (meta-triton) which already ships
# PyTorch 2.13.0.dev+cu130 + Triton 3.6.0+fb.beta editable. It does NOT
# share the conda-based .ci/setup.sh that test.yml uses on the T4 runner.
#
# Triggers are intentionally narrow during stabilization:
#   - workflow_dispatch (manual)
#   - push that touches the H100 CI files or the actual code
# Once stable for 1-2 weeks, broaden to push branches main/develop and
# pull_request, then retire test.yml on T4.

on:
  workflow_dispatch:
    inputs:
      test-type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "build-only"
          - "vectoradd"
      debug:
        description: "Enable debug build"
        required: true
        default: false
        type: boolean
  push:
    paths:
      - ".github/workflows/test-h100.yml"
      - ".ci/setup-h100.sh"
      - ".ci/run_tests.sh"
      - "Makefile"
      - "src/**"
      - "include/**"
      - "python/**"
      - "tests/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test-h100:
    if: github.repository_owner == 'facebookexperimental'
    runs-on: [linux-gcp-h100]
    timeout-minutes: 60
    env:
      # CONDA_ENV is a misnomer inherited from the runner's bootstrap
      # script — it's actually the uv venv name under /workspace/uv_venvs/.
      CONDA_ENV: meta-triton
      SETUP_SCRIPT: /workspace/setup_instance.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Tune Nvidia GPU
        run: |
          sudo nvidia-smi -pm 1 || echo "::warning::sudo nvidia-smi -pm failed"
          sudo ldconfig || echo "::warning::sudo ldconfig failed"
          nvidia-smi

      - name: Activate uv venv (source SETUP_SCRIPT, persist env)
        # SETUP_SCRIPT activates a uv venv at /workspace/uv_venvs/$CONDA_ENV
        # and sets nvidia LD_LIBRARY_PATH for bundled cu13/cudnn/nccl/...
        # libs. Persist the diff to $GITHUB_ENV so subsequent steps
        # inherit. Without this, each step starts in a fresh shell with
        # no venv active.
        run: |
          . "$SETUP_SCRIPT"
          {
            echo "PATH=$PATH"
            echo "VIRTUAL_ENV=$VIRTUAL_ENV"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "TRITONBENCH_PYTORCH_REPO_PATH=$TRITONBENCH_PYTORCH_REPO_PATH"
          } >> "$GITHUB_ENV"
          echo "Active venv: $VIRTUAL_ENV"

      - name: Setup H100 environment (apt + CUDA + cutracer pip)
        # Installs zstd + cuda-toolkit-13-0 via apt, then `uv pip install`
        # cutracer's Python package. Appends CUDA_HOME / PATH / LD_LIBRARY_PATH
        # for /usr/local/cuda-13.0 to $GITHUB_ENV / $GITHUB_PATH.
        run: bash .ci/setup-h100.sh

      - name: Run tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type || 'all' }}
          TIMEOUT: 60
          INSTALL_THIRD_PARTY: 1
          # SKIP_CONDA=1 makes run_tests.sh skip its conda activation block
          # (which writes to /opt/miniconda3 paths that don't exist here).
          # The uv venv is already active via GITHUB_ENV from the earlier
          # step, so the script just inherits it.
          SKIP_CONDA: 1
          # SKIP_PROTON=1 because meta-triton (FB Triton 3.6.0+fb.beta) lags
          # upstream by ~100 days and doesn't yet have proton's
          # `backend="instrumentation", data="trace"` API used by
          # tests/proton_tests/vector-add-instrumented.py — the call
          # silently no-ops, no histogram CSV gets generated, and the test
          # fails. test-h100-triton-nightly.yml uses upstream Triton main
          # (3.7.0+gitcd8e4acc) where proton works, so it does NOT set
          # this. Drop this flag once meta-triton catches up.
          SKIP_PROTON: 1
          DEBUG: ${{ github.event.inputs.debug == 'true' && '1' || '0' }}
        run: bash .ci/run_tests.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-h100-cuda13.0
          path: |
            tests/vectoradd/*.sass
            tests/vectoradd/*.log
            tests/vectoradd/*.ndjson
            tests/vectoradd/*.ndjson.zstd
            tests/py_add/*.log
            tests/py_add/*.sass
            tests/py_add/*.ndjson
            tests/py_add/*.ndjson.zstd
            tests/py_add/mode*_validation.log
            tests/py_add/mode*_run.log
            tests/py_add/mode1_decompressed.ndjson
            tests/proton_tests/*.log
            tests/proton_tests/*.sass
            tests/proton_tests/*.csv
